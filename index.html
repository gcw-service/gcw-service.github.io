<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCW Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .hidden { display: none !important; }
        body { background-color: #131314; color: #e3e3e3; }
        .gemini-card { background-color: #1e1f20; border: 1px solid #333537; transition: all 0.2s ease; }
        .gemini-input { background-color: #131314; border: 1px solid #444746; color: white; width: 100%; border-radius: 0.75rem; padding: 0.75rem; outline: none; }
        .gemini-input:focus { border-color: #4e97ff; }
        .gemini-blue { color: #4e97ff; }
        .gemini-btn { background-color: #4e97ff; color: #000; border-radius: 9999px; font-weight: bold; transition: all 0.2s; }
        .gemini-btn:hover { opacity: 0.9; }
        .admin-danger-btn { background-color: transparent; border: 1px solid #442726; color: #ff5252; border-radius: 9999px; font-size: 10px; padding: 0.5rem 1rem; transition: all 0.2s; }
        .admin-danger-btn:hover { background-color: #442726; }

        /* --- Print Styles --- */
        .print-container {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            background-color: #fff; /* White background for printing */
            max-width: 800px;
            margin: auto;
            padding: 20px;
            border-radius: 1rem;
        }
        .print-header {
            border-bottom: 3px solid #cc0000; /* Massey Red accent */
            margin-bottom: 20px;
            padding-bottom: 10px;
        }
        .print-container table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .print-container th { background-color: #f4f4f4; text-align: left; padding: 12px; border-bottom: 2px solid #ddd; }
        .print-container td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: top; word-wrap: break-word; }
        .col-date { width: 15%; }
        .col-meter { width: 15%; }
        .col-type { width: 12%; }
        .col-provider { width: 20%; }
        .col-notes { width: 38%; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.85em; font-weight: bold; }
        .minor { background: #e3f2fd; color: #1976d2; }
        .major { background: #fff3e0; color: #f57c00; }

        @page {
            size: auto;
            margin: 0; /* Remove browser-added headers and footers */
        }

        @media print {
            .print-header { border-bottom: 1px solid #000; }
            .badge { background: none !important; color: #000 !important; font-weight: normal; }
        }

        /* Apply print styles to the on-screen preview as well */
        #printable-html-area .print-header {
            border-bottom: 1px solid #000;
            border-color: #000; /* Explicitly set for preview */
        }
        #printable-html-area .badge {
            background: none !important;
            color: #000 !important;
            font-weight: normal;
        }
        @media print {
            body * {
                visibility: hidden;
            }
            #details-print-content, #details-print-content * {
                visibility: visible;
            }
            #details-print-content {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
            }
            .print-container {
                box-shadow: none; border: none;
            }
            #details-print-content button {
                display: none;
            }
        }
        select.gemini-input option { background-color: #1e1f20; color: white; }
        .note-bubble { max-width: 90%; width: fit-content; overflow-wrap: break-word; }
        @media print {
        }
    </style>
</head>
<body class="min-h-screen font-sans">

    <div id="auth-screen" class="fixed inset-0 bg-[#131314] z-[100] flex items-center justify-center p-6 text-center">

            <h1 class="text-3xl font-medium mb-8 uppercase tracking-tighter">GCW <span class="gemini-blue">Service</span></h1>

                <div class="relative">
                    <input type="password" id="auth-pass" placeholder="Password" class="gemini-input pr-12" required>
                    <button type="button" onclick="togglePasswordVisibility('auth-pass', 'auth-eye-icon')" class="absolute inset-y-0 right-0 px-4 flex items-center text-gray-500 hover:text-white" aria-label="Toggle password visibility">
                        <svg id="auth-eye-icon" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                    </button>
                </div>
                <div id="confirm-pass-container" class="relative hidden">
                    <input type="password" id="auth-pass-confirm" placeholder="Confirm Password" class="gemini-input pr-12">
                </div>
                <button type="submit" id="auth-main-btn" class="gemini-btn w-full py-3">Sign In</button>

                        </div>
                        <button onclick="updateMachineRecord()" class="gemini-btn w-full py-2 text-sm">Save All Changes</button>
                    </div>
                    <div class="flex justify-between items-center pt-4 border-t border-gray-800/50">

    <script>
        const SUPABASE_URL = 'https://uenxlkvjrvxtbphwbhnh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_mxB4ITMOC-jCevNGJabtbw_lXmvplAJ';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let isSignup = false;
        let myProfile = null;
        let selectedMachineId = null;
        let selectedMachineData = null; // Store the full machine object
        let allFarms = [];
        let allServicers = [];

        // [ID_JS_TOGGLE_AUTH]
        function togglePasswordVisibility(inputId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(inputId.replace('pass', 'eye-icon'));
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7 .925-2.948 3.29-5.344 6.158-6.418M15.536 5.464A9.95 9.95 0 0118.85 8.148M9.172 9.172a3 3 0 00-2.058 2.058m2.058-2.058a3 3 0 012.058 2.058m-2.058-2.058L3 3m8.828 8.828l8.042 8.042"></path>`;
            } else {
                input.type = 'password';
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>`;
            }
        }
        function toggleAuthMode() {
            isSignup = !isSignup;
            document.getElementById('auth-main-btn').innerText = isSignup ? 'Create Account' : 'Sign In';
            document.getElementById('auth-toggle-text').innerText = isSignup ? 'Already have an account?' : 'Need an account?';
            document.getElementById('auth-toggle-btn').innerText = isSignup ? 'Sign In' : 'Sign Up';
            document.getElementById('confirm-pass-container').classList.toggle('hidden', !isSignup);
            document.getElementById('auth-pass-confirm').required = isSignup;
        }

        // [ID_JS_HANDLE_AUTH]
        async function handleAuth(event) {
            event.preventDefault();
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-pass').value;
            const confirmPassword = document.getElementById('auth-pass-confirm').value;
            const msg = document.getElementById('auth-msg');
            msg.classList.add('hidden');
            
            try {
                let result;
                if (isSignup) {
                    if (password !== confirmPassword) {
                        msg.innerText = "Passwords do not match.";
                        msg.classList.remove('hidden');
                        msg.className = "text-xs mt-4 text-red-500";
                        return;
                    }
                    result = await _supabase.auth.signUp({ email, password });
                    if (!result.error) {
                        alert("Account created. Please check your email to verify your account before signing in.");
                        toggleAuthMode(); // Switch back to sign-in view
                    }
                } else {
                    result = await _supabase.auth.signInWithPassword({ email, password });
                }

                if (result.error) {
                    msg.innerText = result.error.message;
                    msg.classList.remove('hidden');
                    msg.className = "text-xs mt-4 text-red-500";
                } else {
                    checkSession();
                }
            } catch (err) { console.error(err); }
        }

        // [ID_JS_CHECK_SESSION]
        async function checkSession() {
            try {
                const { data: { session } } = await _supabase.auth.getSession();
                if (session) {
                    const { data: profile, error } = await _supabase.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
                    if (error || !profile) {
                        showIdMismatchError(session.user.id);
                        return;
                    }
                    myProfile = profile;
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('app-content').classList.remove('hidden');
                    const displayName = profile.nickname || profile.email;
                    const adminBadge = profile.is_admin ? '<span class="bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded text-[10px] font-bold uppercase">Admin</span>' : '';
                    document.getElementById('user-display').innerHTML = `${displayName} ${adminBadge}`;
                    if (profile.is_admin) {
                        document.getElementById('manage-btn').classList.remove('hidden');
                        document.getElementById('add-machine-btn').classList.remove('hidden');
                    }
                    await loadFarms(); 
                    await loadServicers();
                    loadFleet();
                } else {
                    document.getElementById('auth-screen').classList.remove('hidden');

        // [ID_JS_LOAD_FLEET]
        async function loadFleet() {
            if (!myProfile.farm_id && !myProfile.is_admin) {
                document.getElementById('unassigned-msg').classList.remove('hidden');
                document.getElementById('machinery-grid').innerHTML = "";
                return;
            }
            document.getElementById('unassigned-msg').classList.add('hidden');
            
            // We need to join with the farms table to check if the farm is active.
            let query = _supabase.from('machinery').select('*, farm:farms(is_active), notes, service_history');
            
            if (!myProfile.is_admin) query = query.eq('farm_id', myProfile.farm_id);
            
            // Fetch data without ordering from the database
            let { data } = await query;

            // Function to get the most recent timestamp from notes or service history
            const getLatestTimestamp = (machine) => {
                const serviceHistory = (machine.service_history || '').split('\n').filter(n => n.trim());
                const notes = (machine.notes || '').split('\n').filter(n => n.trim());
                const latestService = serviceHistory[0] ? new Date(serviceHistory[0].match(/\[Serviced at (.*?) \|/)?.[1] || 0) : new Date(0);
                const latestNote = notes[0] ? new Date(notes[0].match(/^\[(.*?)\]/)?.[1] || 0) : new Date(0);
                
                if (isNaN(latestService.getTime())) latestService.setTime(0);
                if (isNaN(latestNote.getTime())) latestNote.setTime(0);

                return Math.max(latestService.getTime(), latestNote.getTime());
            };

            // Sort all data by the most recent activity
            data.sort((a, b) => getLatestTimestamp(b) - getLatestTimestamp(a));

            data = (data || []).filter(m => m.farm === null || m.farm.is_active === true);

            // Group machinery by farm
            const groupedByFarm = (data || []).reduce((acc, machine) => {
                const farmId = machine.farm_id || 'unassigned';
                if (!acc[farmId]) {
                    acc[farmId] = [];
                }
                acc[farmId].push(machine);
                return acc;
            }, {});

            // Get a sorted list of farm IDs to display them in order
            const sortedFarmIds = Object.keys(groupedByFarm).sort((a, b) => {
                if (a === 'unassigned') return 1; // 'unassigned' always goes last
                if (b === 'unassigned') return -1;
                const farmA = allFarms.find(f => f.id === a)?.name || '';
                const farmB = allFarms.find(f => f.id === b)?.name || '';
                return farmA.localeCompare(farmB);
            });

            const grid = document.getElementById('machinery-grid');
            grid.innerHTML = sortedFarmIds.map(farmId => {
                const farm = allFarms.find(f => f.id === farmId);
                const farmName = farm ? farm.name : 'Unassigned';
                const machines = groupedByFarm[farmId];

                // Helper to find the meter reading from the last service log
                const getLastServiceMeter = (notes) => {
                    if (!notes) return 0;
                    const serviceLog = notes.split('\n').find(note => note.startsWith('[Serviced at'));
                    if (!serviceLog) return 0;
                    
                    const parts = serviceLog.split(' | ');
                    // The meter reading is the second part, e.g., "1234 hours"
                    if (parts.length > 1) {
                        const meterPart = parts[1];
                        return parseInt(meterPart.match(/\d+/)?.[0] || '0', 10);
                    }
                    return 0;
                };

                const machinesHtml = machines.map(m => {
                const displayFarmName = allFarms.find(f => f.id === m.farm_id)?.name || 'Unknown Farm';
                let serviceStatus = { color: 'bg-gray-700', text: 'N/A' };

                let lastServiceText = "No service history";
                let lastNoteText = "No recent notes.";
                const serviceHistoryArray = (m.service_history || '').split('\n').filter(n => n.trim() !== '');
                const notesArray = (m.notes || '').split('\n').filter(n => n.trim() !== '');

                const lastServiceLog = serviceHistoryArray[0]; // The first line is the most recent
                if (lastServiceLog) {
                    const parts = lastServiceLog.replace('[Serviced at ', '').replace(']', '').split(' | ');
                    // Format: [Serviced at 2/27/2024, 10:00:00 AM | 1250 hours | Major | John Deere | Replaced filter]
                    const date = parts[0] || '';
                    const hours = parts[1] || '';
                    const type = parts[2] || 'Service';
                    lastServiceText = `<span class="font-bold text-green-400">${type}</span> at ${hours} on ${date.split(',')[0]}`;
                }

                const lastRegularNote = notesArray[0]; // The first line is the most recent
                if (lastRegularNote) {
                    const match = lastRegularNote.match(/^\[(.*?)\]\s*(.*)$/);
                    const noteText = match ? (match[2] || '').trim() : lastRegularNote;
                    lastNoteText = `Note: "${noteText}"`;
                }

                const intervalUnit = m.service_interval_unit || 'hours';
                const currentMeter = m.current_meter || 0;
                const serviceDue = m.service_due;
                const unitLabel = intervalUnit.toUpperCase();

                let serviceDueHtml = serviceDue ? `<p class="text-sm text-gray-400 mt-1" title="Service Due At">Service due: ${serviceDue} ${unitLabel}</p>` : '';

                return `
                <div onclick='openDetailsModal(${JSON.stringify(m).replace(/'/g, "&apos;")})' 
                     class="gemini-card rounded-3xl p-6 group flex flex-col justify-between min-h-[240px]">
                    <div>
                        <h3 class="text-xl font-bold group-hover:text-blue-400 transition-colors cursor-pointer">${m.name}</h3>
                        <div class="mt-2">
                            <p class="text-3xl font-black" title="Current Meter Reading">${currentMeter} <span class="text-base font-bold text-gray-400">${unitLabel}</span></p>
                            ${serviceDueHtml}
                        </div>
                    </div>
                    <div class="mt-4 pt-4 border-t border-gray-800/50">
                        <div class="flex justify-between items-center">
                            <p class="text-[10px] text-gray-600 uppercase font-bold">${displayFarmName}</p>
                            <span class="text-[10px] text-blue-500 font-bold opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer">View Details &rarr;</span>
                        </div>
                        <div class="text-xs text-gray-400 mt-2 space-y-1">
                            <p class="truncate" title="${lastServiceText.replace(/<[^>]*>?/gm, '')}">${lastServiceText}</p>
                            <p class="truncate" title="${lastNoteText.replace(/<[^>]*>?/gm, '')}">${lastNoteText}</p>
                        </div>
                    </div>
                </div>`;
                }).join('');

                return `
                    <div>
                        <h2 class="text-2xl font-bold tracking-tight mb-4 pb-4 border-b border-gray-800">${farmName}</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${machinesHtml}
                        </div>
                    </div>`;
            }).join('');
        }

        // [ID_JS_LOG_SERVICE] - REBUILT
        async function submitNewServiceLog() {
            if (!selectedMachineId) return alert("No machine selected.");

            const hours = document.getElementById('log-machine-hours').value;
            const servicer = document.getElementById('log-servicer-select').value;
            const type = document.getElementById('log-service-type').value;
            const notes = document.getElementById('log-service-notes').value.trim();

            if (!hours) return alert("Machine hours are required to log a service.");
            if (!servicer) return alert("Servicer is required.");

            const { data: machine } = await _supabase.from('machinery').select('service_history').eq('id', selectedMachineId).single();
            if (!machine) return alert("Could not find machine to update.");

            const now = new Date();
            const timestamp = now.toLocaleString(); // Use a standard format for sorting
            
            let logEntry = `[Serviced at ${timestamp} | ${hours} hours | ${type} | ${servicer}`;
            if (notes) logEntry += ` | ${notes}`;
            logEntry += ']';

            const updatedHistory = machine.service_history ? `${logEntry}\n${machine.service_history}` : logEntry;

            const { error } = await _supabase.from('machinery')
                .update({ 
                    last_service_date: now.toISOString().split('T')[0], // Set service date to today
                    service_history: updatedHistory,
                    current_meter: parseInt(hours), // Update the main meter reading

                })
                .eq('id', selectedMachineId);

            if (error) {
                alert("Error logging service: " + error.message);

                alert("Service logged successfully!");
                document.getElementById('log-service-modal').classList.add('hidden');
                closeDetailsModal(); // Close the main details modal as well
                loadFleet(); // Refresh the main grid

        }

                        <td>${servicer || 'N/A'}</td>

                    </tr>
                `;
            }).join('');

            const tableBody = serviceLogs.length > 0 ? tableRows : `<tr><td colspan="5" style="text-align:center; padding: 20px;">No service history found.</td></tr>`;

            const html = `
                <div class="print-container">

                                <th class="col-notes">Notes</th>

                        <tbody>${tableBody}</tbody>
                    </table>
                </div>`;
            container.innerHTML = html;

            list.innerHTML = (allMgmtFarms || []).map(f => {
                const inactiveClass = !f.is_active ? 'opacity-40 bg-red-900/10' : '';
                const actionButton = f.is_active
                    ? `<button onclick="toggleFarmActiveStatus('${f.id}', false)" class="admin-danger-btn">Delete</button>`
                    : `<button onclick="toggleFarmActiveStatus('${f.id}', true)" class="text-[10px] bg-blue-600 px-3 py-1 rounded-lg hover:bg-blue-500">Restore</button>`;

                return `
                <div class="flex items-center justify-between p-4 bg-[#131314] rounded-2xl border border-gray-800 ${inactiveClass}">
                    <div class="flex-1 mr-4">
                        <input type="text" id="edit-farm-name-${f.id}" value="${f.name}" 
                               class="bg-transparent border-none text-white font-bold text-sm focus:ring-0 w-full">
                        <p class="text-[10px] text-gray-500 font-mono">${f.id}</p>
                    </div>
                    <div class="flex gap-2">
                        ${actionButton}
                        <button onclick="renameFarm('${f.id}')" class="text-[10px] bg-green-900/20 text-green-400 px-3 py-1 rounded-lg border border-green-800">Rename</button>
                        <button onclick="copyToClipboard('${f.id}')" class="text-[10px] bg-gray-800 text-blue-400 px-3 py-1 rounded-lg border border-gray-700">ID</button>
                    </div>
                </div>`;
            }).join('');
        }

        async function toggleFarmActiveStatus(farmId, newStatus) {
            const action = newStatus ? 'restore' : 'delete';
            if (!confirm(`Are you sure you want to ${action} this farm?`)) return;
            const { error } = await _supabase.from('farms').update({ is_active: newStatus }).eq('id', farmId);
            if (error) {
                alert(error.message);
            } else {
                await Promise.all([showFarmManagement(), loadFarms(), loadFleet()]);
            }
        }

        async function renameFarm(farmId) {
            const newName = document.getElementById(`edit-farm-name-${farmId}`).value.trim();
            if (!newName) return;
            const { error } = await _supabase.from('farms').update({ name: newName }).eq('id', farmId);
            if (error) alert(error.message); else { alert("Farm renamed."); loadFarms(); }
        }

        async function createNewFarm() {
            const name = document.getElementById('new-farm-name').value.trim();
            if (!name) return alert("Farm name required.");
            const { error } = await _supabase.from('farms').insert([{ name }]);
            if (error) alert(error.message); else { document.getElementById('new-farm-name').value = ""; await showFarmManagement(); }
        }

        // [ID_JS_SERVICER_MGMT]
        async function showServicerManagement() {
            await loadServicers();
            const list = document.getElementById('servicer-list');
            list.innerHTML = allServicers.map(s => `
                <div class="flex items-center justify-between p-4 bg-[#131314] rounded-2xl border border-gray-800">
                    <p class="text-white font-bold text-sm">${s.name}</p>
                    <button onclick="deleteServicer('${s.id}')" class="admin-danger-btn">Delete</button>
                </div>`).join('');
        }

        async function createNewServicer() {
            const name = document.getElementById('new-servicer-name').value.trim();
            if (!name) return alert("Servicer name required.");
            const { error } = await _supabase.from('servicers').insert([{ name }]);
            if (error) alert(error.message); else { document.getElementById('new-servicer-name').value = ""; await showServicerManagement(); }
        }

        async function deleteServicer(servicerId) {
            if (!confirm("Are you sure you want to delete this servicer? This cannot be undone.")) return;
            const { error } = await _supabase.from('servicers').delete().eq('id', servicerId);
            if (error) alert(error.message);
            else { await showServicerManagement(); }
        }

        // [ID_JS_UTILS]
        function copyToClipboard(text) { navigator.clipboard.writeText(text); alert("ID copied."); }

        // [ID_JS_USER_MGMT]
        async function showUserManagement() {
            await loadFarms(); // Ensure farm data is fresh
            const { data: users, error } = await _supabase.from('profiles').select('*').order('email');
            if (error) return;
            const list = document.getElementById('user-list');
            list.innerHTML = (users || []).map(u => {
                const currentFarm = allFarms.find(f => f.id === u.farm_id);
                return `
                <div class="flex items-center justify-between p-4 bg-[#131314] rounded-2xl border border-gray-800/80">
                    <div class="flex-1 pr-4">
                        <div class="flex items-center gap-2 mb-1">
                            <p class="font-bold text-sm">${u.nickname || u.email}</p>
                            <span class="text-[9px] font-bold uppercase px-2 py-0.5 rounded-full ${u.is_admin ? 'bg-blue-500/20 text-blue-400' : 'bg-gray-700 text-gray-400'}">${u.is_admin ? 'Admin' : 'User'}</span>
                        </div>
                        ${u.nickname ? `<p class="text-xs text-gray-500 font-mono">${u.email}</p>` : ''}
                        <p class="text-[10px] text-gray-500 uppercase mt-2">Current Farm: ${currentFarm ? currentFarm.name : 'None'}</p>
                    </div>
                    <div class="flex gap-2">
                        <select id="user-farm-select-${u.id}" class="text-[10px] p-2 bg-black rounded border border-gray-700 w-32">
                            <option value="">No Farm (Clear)</option>
                            ${allFarms.map(f => `<option value="${f.id}" ${u.farm_id === f.id ? 'selected' : ''}>${f.name}</option>`).join('')}
                        </select>
                        <button id="update-btn-${u.id}" onclick="updateUserFarm('${u.id}')" class="text-[10px] bg-blue-600 px-3 py-1 rounded-lg hover:bg-blue-500 transition-colors">Update</button>
                    </div>
                </div>`;
            }).join('');
        }

        // [ID_JS_UPDATE_USER_FARM]
        async function updateUserFarm(userId) {
            const btn = document.getElementById(`update-btn-${userId}`);
            const selectEl = document.getElementById(`user-farm-select-${userId}`);
            const farmId = selectEl.value || null;
            btn.disabled = true;
            btn.innerText = "Wait...";
            const { data, error } = await _supabase.from('profiles').update({ farm_id: farmId }).eq('id', userId).select();
            if (error) {
                alert("Update failed: " + error.message);
                btn.disabled = false;
                btn.innerText = "Update";
            } else {
                if (userId === myProfile.id) { myProfile = data[0]; loadFleet(); }
                await showUserManagement(); 
                alert("User Assignment Updated Successfully");
            }
        }

        // [ID_JS_UPDATE_USER_NICKNAME]
        async function updateUserNickname() {
            const newNickname = document.getElementById('update-nickname-input').value.trim();
            const { data, error } = await _supabase.from('profiles')
                .update({ nickname: newNickname })
                .eq('id', myProfile.id)
                .select()
                .single();

            if (error) { alert("Update failed: " + error.message); } 
            else { myProfile = data; checkSession(); closeSettingsModal(); alert("Nickname updated!"); }
        }

        // [ID_JS_LOGOUT]
        async function handleLogout() { await _supabase.auth.signOut(); location.reload(); }

        window.onload = () => { checkSession(); };
    </script>
</body>
</html>
