<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connection Test</title>
<style>
body {
background-color: #121212;
color: #ffffff;
font-family: sans-serif;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
height: 100vh;
margin: 0;
text-align: center;
}
.status-card {
border: 2px solid #4e97ff;
background-color: #1e1f20;
padding: 2rem;
border-radius: 20px;
box-shadow: 0 10px 30px rgba(0,0,0,0.5);
max-width: 80%;
}
</style>
</head>
<body>
<div class="status-card">
<h1>Browser is Clear</h1>
<p>If you see this page, the redirect is not happening at the domain level.</p>
<p id="load-time"></p>
</div>
<script>
document.getElementById('load-time').innerText = "Loaded at: " + new Date().toLocaleString();
</script>
</body>
</html>
