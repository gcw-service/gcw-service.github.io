<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCW Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .hidden { display: none !important; }
        body { background-color: #131314; color: #e3e3e3; }
        .gemini-card { background-color: #1e1f20; border: 1px solid #333537; transition: all 0.2s ease; }
        .gemini-input { background-color: #131314; border: 1px solid #444746; color: white; width: 100%; border-radius: 0.75rem; padding: 0.75rem; outline: none; }
        .gemini-input:focus { border-color: #4e97ff; }
        .gemini-blue { color: #4e97ff; }
        .gemini-btn { background-color: #4e97ff; color: #000; border-radius: 9999px; font-weight: bold; transition: all 0.2s; }
        .gemini-btn:hover { opacity: 0.9; }
        .admin-danger-btn { background-color: transparent; border: 1px solid #442726; color: #ff5252; border-radius: 9999px; font-size: 10px; padding: 0.5rem 1rem; transition: all 0.2s; }
        .admin-danger-btn:hover { background-color: #442726; }
        select.gemini-input option { background-color: #1e1f20; color: white; }
        .note-bubble { max-width: 90%; width: fit-content; }
        @media print {
        }
    </style>
</head>
<body class="min-h-screen font-sans">

    <div id="auth-screen" class="fixed inset-0 bg-[#131314] z-[100] flex items-center justify-center p-6 text-center">
        <div class="w-full max-w-sm">
            <h1 class="text-3xl font-medium mb-8 uppercase tracking-tighter">GCW <span class="gemini-blue">Service</span></h1>
            <form onsubmit="handleAuth(event)" class="space-y-4">
                <input type="email" id="auth-email" placeholder="Email" class="gemini-input" required>
                <input type="password" id="auth-pass" placeholder="Password" class="gemini-input" required>
                <button type="submit" id="auth-main-btn" class="gemini-btn w-full py-4">Sign In</button>
                <p class="text-xs text-[#8e918f]">
                    <span id="auth-toggle-text">Need an account?</span> 
                    <button type="button" onclick="toggleAuthMode()" class="gemini-blue underline" id="auth-toggle-btn">Sign Up</button>
                </p>
            </form>
            <p id="auth-msg" class="text-xs mt-4 hidden"></p>
        </div>
    </div>

    <div id="app-content" class="hidden p-4 md:p-8">
        <header class="max-w-5xl mx-auto flex justify-between items-center mb-10">
            <div>
                <h1 class="text-2xl font-normal">GCW <span class="gemini-blue font-bold tracking-tight">Service</span></h1>
                <div id="user-display" class="text-[#8e918f] text-xs mt-1 flex items-center gap-2">Checking access...</div>
            </div>
            <div class="flex gap-4 items-center">
                <button id="manage-btn" class="hidden text-xs bg-gray-800 px-4 py-2 rounded-full border border-gray-700 text-yellow-400 hover:bg-gray-700" onclick="openManagementModal()">Manage</button>
                <button id="add-machine-btn" class="hidden gemini-btn px-6 py-2" onclick="openAddModal()">+ Add</button>
                <button onclick="openSettingsModal()" class="text-xs text-[#8e918f] hover:text-white">Settings</button>
                <button onclick="handleLogout()" class="text-xs text-[#8e918f] hover:text-white">Sign Out</button>
            </div>
        </header>

        <main class="max-w-5xl mx-auto">
            <div id="unassigned-msg" class="hidden text-center py-20">
                <h2 class="text-xl text-[#8e918f]">Account Pending.</h2>
                <p class="text-sm mt-2">An admin needs to assign your farm before you can see machinery.</p>
            </div>
            <div id="machinery-grid" class="space-y-12"></div>
        </main>
    </div>

    <div id="details-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center p-4 z-[70]">
        <div class="gemini-card w-full max-w-lg rounded-3xl p-8 shadow-2xl">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h2 id="details-name" class="text-3xl font-bold tracking-tight">Machine Name</h2>
                    <p id="details-farm-id" class="text-[10px] text-gray-500 uppercase mt-1"></p>
                </div>
                <button onclick="closeDetailsModal()" class="text-3xl leading-none text-gray-400 hover:text-white">&times;</button>
            </div>
            
            <!-- Tab Navigation -->
            <div id="details-tabs" class="hidden flex gap-2 mb-6 border-b border-gray-800">
                <button id="tab-regular" onclick="switchDetailsTab('regular')" class="details-tab-btn px-4 py-2 text-sm font-bold text-gray-400 border-b-2 border-transparent hover:text-white transition-colors">View</button>
                <button id="tab-edit" onclick="switchDetailsTab('edit')" class="details-tab-btn hidden px-4 py-2 text-sm font-bold text-gray-400 border-b-2 border-transparent hover:text-white transition-colors">Edit</button>
                <button id="tab-print" onclick="switchDetailsTab('print')" class="details-tab-btn px-4 py-2 text-sm font-bold text-gray-400 border-b-2 border-transparent hover:text-white transition-colors">Print</button>
            </div>
            
            <div class="space-y-6">
                <!-- Regular Tab Content -->
                <div id="details-regular-content">
                    <!-- Note History Container -->
                    <div id="details-notes-content" class="bg-black/20 p-4 rounded-xl border border-gray-800/50 text-sm text-gray-300 max-h-[350px] overflow-y-auto flex flex-col-reverse">
                    </div>
                    <div class="mt-4 pt-4 border-t border-gray-800/50 space-y-3">
                        <div class="flex gap-2">
                            <textarea id="add-note-textarea" placeholder="Add a quick note..." rows="1" class="gemini-input text-sm py-2"></textarea>
                            <button onclick="addMachineNote()" class="gemini-btn text-sm px-4">Save Note</button>
                        </div>
                        <button onclick="openLogServiceModal()" class="w-full bg-green-600/20 text-green-400 border border-green-900/80 text-sm font-bold py-3 rounded-lg hover:bg-green-600/30">Log New Service</button>
                    </div>
                </div>
                
                <!-- Edit Tab Content (Admin Only) -->
                <div id="details-edit-content" class="hidden space-y-4">
                    <div class="space-y-3 text-left">
                        <div>
                            <label class="text-[10px] text-gray-500 uppercase ml-2">Machine Name</label>
                            <input type="text" id="update-name-input" class="gemini-input py-2 text-sm">
                        </div>
                        <div>
                            <label class="text-[10px] text-gray-500 uppercase ml-2">Move to Farm</label>
                            <select id="update-farm-select" class="gemini-input py-2 text-sm"></select>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="col-span-2 sm:col-span-1">
                                <label class="text-[10px] text-gray-500 uppercase ml-2">Current Meter</label>
                                <input type="number" id="update-current-meter-input" class="gemini-input py-2 text-sm">
                            </div>
                            <div class="col-span-2 sm:col-span-1">
                                <label class="text-[10px] text-gray-500 uppercase ml-2">Interval Unit</label>
                                <select id="update-service-interval-unit-select" class="gemini-input py-2 text-sm">
                                    <option value="days">Days</option>
                                    <option value="hours">Hours</option>
                                    <option value="km">Kilometers</option>
                                </select>
                            </div>
                            <div class="col-span-2">
                                <label class="text-[10px] text-gray-500 uppercase ml-2">Last Service Date</label>
                                <input type="date" id="update-last-service-date-input" class="gemini-input py-2 text-sm">
                            </div>
                        </div>
                        <div>
                            <textarea id="update-notes-input" placeholder="Service notes, operational quirks, etc." rows="3" class="gemini-input py-2 text-sm"></textarea>
                        </div>
                        <button onclick="updateMachineRecord()" class="gemini-btn w-full py-2 text-sm">Save All Changes</button>
                    </div>
                    <div class="flex justify-between items-center pt-4 border-t border-gray-800/50">
                        <p class="text-[10px] text-gray-600 font-bold uppercase">Danger Zone</p>
                        <button id="delete-machine-btn" onclick="deleteMachine()" class="admin-danger-btn">Delete Vehicle</button>
                    </div>
                </div>

                <!-- Print Tab Content -->
                <div id="details-print-content" class="hidden space-y-4">
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase ml-2">Copyable Service History</label>
                        <textarea id="printable-text-area" rows="10" class="gemini-input font-mono text-xs" readonly></textarea>
                    </div>
                    <button onclick="copyPrintableText()" class="gemini-btn w-full py-2 text-sm">Copy to Clipboard</button>
                </div>
            </div>
        </div>
    </div>

    <div id="management-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center p-4 z-[60]">
        <div class="gemini-card w-full max-w-2xl rounded-3xl p-8 max-h-[80vh] overflow-y-auto">
            <div class="flex justify-between mb-6">
                <h2 class="text-2xl font-bold text-yellow-400">Management</h2>
                <button onclick="closeManagementModal()" class="text-2xl hover:text-white">&times;</button>
            </div>
            <!-- Management Tabs -->
            <div class="flex gap-2 mb-6 border-b border-gray-800">
                <button id="mgmt-tab-users" onclick="switchManagementTab('users')" class="mgmt-tab-btn px-4 py-2 text-sm font-bold">Users</button>
                <button id="mgmt-tab-farms" onclick="switchManagementTab('farms')" class="mgmt-tab-btn px-4 py-2 text-sm font-bold">Farms</button>
                <button id="mgmt-tab-servicers" onclick="switchManagementTab('servicers')" class="mgmt-tab-btn px-4 py-2 text-sm font-bold">Servicers</button>
            </div>

            <!-- Users Tab Content -->
            <div id="mgmt-content-users" class="mgmt-content hidden">
                <div id="user-list" class="space-y-4"></div>
            </div>

            <!-- Farms Tab Content -->
            <div id="mgmt-content-farms" class="mgmt-content hidden">
                <div class="bg-black/30 p-4 rounded-2xl mb-6 border border-gray-800">
                    <h3 class="text-xs font-bold uppercase text-gray-500 mb-3">Add New Farm</h3>
                    <div class="flex gap-2">
                        <input type="text" id="new-farm-name" placeholder="Farm Name" class="gemini-input py-2 text-sm">
                        <button onclick="createNewFarm()" class="bg-green-600 text-black font-bold px-6 py-2 rounded-xl text-sm">Create</button>
                    </div>
                </div>
                <div id="farm-list" class="space-y-3"></div>
            </div>

            <!-- Servicers Tab Content -->
            <div id="mgmt-content-servicers" class="mgmt-content hidden">
                <div class="bg-black/30 p-4 rounded-2xl mb-6 border border-gray-800">
                    <h3 class="text-xs font-bold uppercase text-gray-500 mb-3">Add New Servicer</h3>
                    <div class="flex gap-2">
                        <input type="text" id="new-servicer-name" placeholder="Servicer Name (e.g., John Deere)" class="gemini-input py-2 text-sm">
                        <button onclick="createNewServicer()" class="bg-purple-600 text-black font-bold px-6 py-2 rounded-xl text-sm">Create</button>
                    </div>
                </div>
                <div id="servicer-list" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <div id="add-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center p-4 z-[60]">
        <div class="gemini-card w-full max-w-md rounded-3xl p-8">
            <div class="flex justify-between mb-6">
                <h2 class="text-2xl font-bold gemini-blue">Add Machinery</h2>
                <button onclick="closeAddModal()" class="text-2xl hover:text-white">&times;</button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-gray-500 uppercase ml-2">Machine Name</label>
                    <input type="text" id="new-machine-name" placeholder="e.g. Case IH Magnum" class="gemini-input">
                </div>
                <div>
                    <label class="text-[10px] text-gray-400 uppercase ml-2">Assign to Farm</label>
                    <select id="new-machine-farm-select" class="gemini-input">
                        <option value="">Loading Farms...</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] text-gray-400 uppercase ml-2">Service Interval (days)</label>
                        <input type="number" id="new-machine-service-interval" placeholder="e.g. 250" class="gemini-input">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-400 uppercase ml-2">Last Service Date</label>
                        <input type="date" id="new-machine-last-service-date" class="gemini-input">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] text-gray-400 uppercase ml-2">Notes (Optional)</label>
                    <textarea id="new-machine-notes" rows="2" placeholder="Initial notes..." class="gemini-input"></textarea>
                    </select>
                </div>
                <button onclick="saveMachine()" class="gemini-btn w-full py-4 mt-4">Save Machine</button>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center p-4 z-[60]">
        <div class="gemini-card w-full max-w-md rounded-3xl p-8">
            <div class="flex justify-between mb-6">
                <h2 class="text-2xl font-bold gemini-blue">User Settings</h2>
                <button onclick="closeSettingsModal()" class="text-2xl hover:text-white">&times;</button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-gray-500 uppercase ml-2">Nickname</label>
                    <input type="text" id="update-nickname-input" placeholder="e.g. Johnny" class="gemini-input">
                </div>
                <button onclick="updateUserNickname()" class="gemini-btn w-full py-4 mt-4">Save Settings</button>
            </div>
        </div>
    </div>

    <div id="log-service-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center p-4 z-[80]">
        <div class="gemini-card w-full max-w-md rounded-3xl p-8">
            <div class="flex justify-between mb-6">
                <h2 class="text-2xl font-bold text-green-400">Log New Service</h2>
                <button onclick="closeLogServiceModal()" class="text-2xl hover:text-white">&times;</button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-gray-400 uppercase ml-2">Machine Hours (from meter)</label>
                    <input type="number" id="log-machine-hours" placeholder="e.g. 430" class="gemini-input">
                </div>
                <div>
                    <label class="text-[10px] text-gray-400 uppercase ml-2">Serviced By</label>
                    <select id="log-servicer-select" class="gemini-input">
                        <option value="">Loading...</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] text-gray-400 uppercase ml-2">Service Type</label>
                    <select id="log-service-type" class="gemini-input">
                        <option value="Minor">Minor Service</option>
                        <option value="Major">Major Service</option>
                    </select>
                </div>
                <textarea id="log-service-notes" rows="2" placeholder="Optional notes, e.g. Replaced oil filter" class="gemini-input"></textarea>
                <button onclick="submitNewServiceLog()" class="bg-green-600 text-black font-bold w-full py-4 mt-4 rounded-xl hover:opacity-90">Save Service Log</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://uenxlkvjrvxtbphwbhnh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_mxB4ITMOC-jCevNGJabtbw_lXmvplAJ';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let isSignup = false;
        let myProfile = null;
        let selectedMachineId = null;
        let selectedMachineData = null; // Store the full machine object
        let allFarms = [];
        let allServicers = [];

        // [ID_JS_TOGGLE_AUTH]
        function toggleAuthMode() {
            isSignup = !isSignup;
            document.getElementById('auth-main-btn').innerText = isSignup ? 'Create Account' : 'Sign In';
            document.getElementById('auth-toggle-text').innerText = isSignup ? 'Already have an account?' : 'Need an account?';
            document.getElementById('auth-toggle-btn').innerText = isSignup ? 'Sign In' : 'Sign Up';
        }

        // [ID_JS_HANDLE_AUTH]
        async function handleAuth(event) {
            event.preventDefault();
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-pass').value;
            const msg = document.getElementById('auth-msg');
            msg.classList.add('hidden');
            
            try {
                let result;
                if (isSignup) {
                    result = await _supabase.auth.signUp({ email, password });
                    if (!result.error) alert("Account created. Please sign in.");
                } else {
                    result = await _supabase.auth.signInWithPassword({ email, password });
                }

                if (result.error) {
                    msg.innerText = result.error.message;
                    msg.classList.remove('hidden');
                    msg.className = "text-xs mt-4 text-red-500";
                } else {
                    checkSession();
                }
            } catch (err) { console.error(err); }
        }

        // [ID_JS_CHECK_SESSION]
        async function checkSession() {
            try {
                const { data: { session } } = await _supabase.auth.getSession();
                if (session) {
                    const { data: profile, error } = await _supabase.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
                    if (error || !profile) {
                        showIdMismatchError(session.user.id);
                        return;
                    }
                    myProfile = profile;
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('app-content').classList.remove('hidden');
                    const displayName = profile.nickname || profile.email;
                    const adminBadge = profile.is_admin ? '<span class="bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded text-[10px] font-bold uppercase">Admin</span>' : '';
                    document.getElementById('user-display').innerHTML = `${displayName} ${adminBadge}`;
                    if (profile.is_admin) {
                        document.getElementById('manage-btn').classList.remove('hidden');
                        document.getElementById('add-machine-btn').classList.remove('hidden');
                    }
                    await loadFarms(); 
                    await loadServicers();
                    loadFleet();
                } else {
                    document.getElementById('auth-screen').classList.remove('hidden');
                    document.getElementById('app-content').classList.add('hidden');
                }
            } catch (err) { console.error(err); }
        }

        // [ID_JS_LOAD_FARMS]
        async function loadFarms() {
            // This function's only job is to fetch farms and update the global variable.
            const { data } = await _supabase.from('farms').select('*').eq('is_active', true).order('name');
            allFarms = data || [];
        }

        // [ID_JS_LOAD_SERVICERS]
        async function loadServicers() {
            const { data } = await _supabase.from('servicers').select('*').order('name');
            allServicers = data || [];
        }

        // [ID_JS_MISMATCH_ERROR]
        function showIdMismatchError(id) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            // Hide admin buttons on error to prevent interaction
            document.getElementById('manage-btn').classList.add('hidden');
            document.getElementById('add-machine-btn').classList.add('hidden');
            document.getElementById('user-display').innerHTML = `
                <div class="bg-red-900/20 border border-red-500 p-4 rounded-xl mt-4 text-left">
                    <p class="text-red-500 font-bold">Profile Policy/ID Error</p>
                    <code class="block bg-black p-2 mt-2 rounded text-blue-400 select-all text-[10px]">${id}</code>
                    <button onclick="handleLogout()" class="mt-2 text-xs underline">Log Out</button>
                </div>`;
        }

        // [ID_JS_LOAD_FLEET]
        async function loadFleet() {
            if (!myProfile.farm_id && !myProfile.is_admin) {
                document.getElementById('unassigned-msg').classList.remove('hidden');
                document.getElementById('machinery-grid').innerHTML = "";
                return;
            }
            document.getElementById('unassigned-msg').classList.add('hidden');
            
            // We need to join with the farms table to check if the farm is active.
            let query = _supabase.from('machinery').select('*, farm:farms(is_active)');
            
            if (!myProfile.is_admin) query = query.eq('farm_id', myProfile.farm_id);
            
            // Fetch data without ordering from the database
            let { data } = await query;

            data = (data || []).filter(m => m.farm === null || m.farm.is_active === true);

            // Helper function to calculate service priority
            const calculatePriority = (machine) => {
                const calculatePriority = (machine) => {
                    if (!machine.service_interval || machine.service_interval <= 0) {
                        return -Infinity; // Machines without an interval go to the bottom.
                    }
                    let current_hours = 0;
                    if (machine.last_service_date) {
                        const lastServiceTime = new Date(machine.last_service_date).getTime();
                        const now = new Date().getTime();
                        current_hours = Math.floor((now - lastServiceTime) / (1000 * 60 * 60 * 24));
                    }
                    return current_hours / machine.service_interval;
                };

                return calculatePriority(machine);
            };

            // Group machinery by farm
            const groupedByFarm = (data || []).reduce((acc, machine) => {
                const farmId = machine.farm_id || 'unassigned';
                if (!acc[farmId]) {
                    acc[farmId] = [];
                }
                acc[farmId].push(machine);
                return acc;
            }, {});

            // Sort machinery within each group by service priority
            for (const farmId in groupedByFarm) {
                groupedByFarm[farmId].sort((a, b) => calculatePriority(b) - calculatePriority(a));
            }

            // Get a sorted list of farm IDs to display them in order
            const sortedFarmIds = Object.keys(groupedByFarm).sort((a, b) => {
                if (a === 'unassigned') return 1; // 'unassigned' always goes last
                if (b === 'unassigned') return -1;
                const farmA = allFarms.find(f => f.id === a)?.name || '';
                const farmB = allFarms.find(f => f.id === b)?.name || '';
                return farmA.localeCompare(farmB);
            });

            const grid = document.getElementById('machinery-grid');
            grid.innerHTML = sortedFarmIds.map(farmId => {
                const farm = allFarms.find(f => f.id === farmId);
                const farmName = farm ? farm.name : 'Unassigned';
                const machines = groupedByFarm[farmId];

                // Helper to find the meter reading from the last service log
                const getLastServiceMeter = (notes) => {
                    if (!notes) return 0;
                    const serviceLog = notes.split('\n').find(note => note.startsWith('[Serviced at'));
                    if (!serviceLog) return 0;
                    
                    const parts = serviceLog.split(' | ');
                    // The meter reading is the second part, e.g., "1234 hours"
                    if (parts.length > 1) {
                        const meterPart = parts[1];
                        return parseInt(meterPart.match(/\d+/)?.[0] || '0', 10);
                    }
                    return 0;
                };

                const machinesHtml = machines.map(m => {
                const displayFarmName = allFarms.find(f => f.id === m.farm_id)?.name || 'Unknown Farm';
                let serviceStatus = { color: 'bg-gray-700', text: 'N/A' };
                
                // --- REAL-TIME USAGE CALCULATION ---
                // This calculation is currently based on days. We will adjust this.
                let current_hours = 0;
                if (m.last_service_date) {
                    const lastServiceTime = new Date(m.last_service_date).getTime();
                    const now = new Date().getTime();
                    current_hours = Math.floor((now - lastServiceTime) / (1000 * 60 * 60 * 24));
                }
                // --- END REAL-TIME CALCULATION ---

                let lastServiceText = "No service history";
                let dueText = "Interval not set";
                let dueClass = "text-gray-400";
                const intervalUnit = m.service_interval_unit || 'days';
                const intervalUnitLabel = intervalUnit.charAt(0).toUpperCase() + intervalUnit.slice(1);
                const currentMeter = m.current_meter || 0;

                if (m.service_interval > 0) {
                    const lastServiceMeter = getLastServiceMeter(m.notes);
                    const nextServiceDueAt = lastServiceMeter + m.service_interval;
                    const remaining = nextServiceDueAt - currentMeter;

                    if (m.last_service_date) {
                        const lastServiceDate = new Date(m.last_service_date);
                        lastServiceText = `Last Service: ${lastServiceDate.toLocaleDateString()}`;
                        
                        if (remaining <= 0) {
                            dueText = `Due ${Math.abs(remaining)} ${intervalUnitLabel} ago`;
                            dueClass = "text-red-400";
                        } else if (remaining <= (m.service_interval * 0.1)) { // Due within 10% of interval
                            dueText = `Due in ${remaining} ${intervalUnitLabel}`;
                            dueClass = "text-yellow-400";
                        } else {
                            dueText = `Due in ${remaining} ${intervalUnitLabel}`;
                            dueClass = "text-green-400";
                        }
                    } else {
                        lastServiceText = "No service on record";
                        dueText = `Service due at ${m.service_interval} ${intervalUnitLabel}`;
                    }
                }

                const unitLabel = intervalUnit.toUpperCase();

                return `
                <div onclick='openDetailsModal(${JSON.stringify(m)})' 
                     class="gemini-card rounded-3xl p-6 group flex flex-col justify-between">
                    <div>
                        <h3 class="text-xl font-bold group-hover:text-blue-400 transition-colors cursor-pointer">${m.name}</h3>
                        <p class="text-3xl font-black mt-2" title="Current Meter Reading">
                            ${currentMeter} <span class="text-base font-bold text-gray-400">${unitLabel}</span>
                        </p>
                    </div>
                    <div class="mt-4 pt-4 border-t border-gray-800/50">
                        <div class="flex justify-between items-center">
                            <p class="text-[10px] text-gray-600 uppercase font-bold">${displayFarmName}</p>
                            <span class="text-[10px] text-blue-500 font-bold opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer">View Details &rarr;</span>
                        </div>
                        <div class="text-xs text-gray-400 mt-2">
                            <p>${lastServiceText}</p>
                        </div>
                    </div>
                </div>`;
                }).join('');

                return `
                    <div>
                        <h2 class="text-2xl font-bold tracking-tight mb-4 pb-4 border-b border-gray-800">${farmName}</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${machinesHtml}
                        </div>
                    </div>`;
            }).join('');
        }

        function openDetailsModal(machine) {
            selectedMachineId = machine.id;
            selectedMachineData = machine; // Store for later use (e.g., printing)

            // Use the same real-time calculation as the main grid for consistency
            let current_hours = 0;
            if (machine.last_service_date) {
                const lastServiceTime = new Date(machine.last_service_date).getTime();
                const now = new Date().getTime();
                current_hours = Math.floor((now - lastServiceTime) / (1000 * 60 * 60 * 24));
            }

            const farmName = allFarms.find(f => f.id === machine.farm_id)?.name || machine.farm_id;
            document.getElementById('details-name').innerText = machine.name;
            document.getElementById('details-farm-id').innerText = `Location: ${farmName}`;

            // Notes
            const notesContentEl = document.getElementById('details-notes-content');
            notesContentEl.innerHTML = ''; // Clear previous content

            if (machine.notes && machine.notes.trim()) {
                const notesArray = machine.notes.split('\n').filter(note => note.trim() !== '');
                notesContentEl.innerHTML = notesArray.map(note => {
                    const isServiceLog = note.startsWith('[Serviced at');
                    
                    if (isServiceLog) {
                        const content = note.replace('[', '').replace(']', '');
                        const parts = content.split(' | ');
                        const timestamp = parts[0]?.replace('Serviced at ', '') || 'N/A';
                        const hours = parts[1] || 'N/A';
                        const type = parts[2] || 'N/A';
                        const servicer = parts[3] || 'N/A';
                        const serviceNote = parts[4] ? `<p class="mt-1 text-xs text-gray-300 italic">"${parts[4]}"</p>` : '';

                        return `
                            <div class="note-bubble self-start bg-green-900/50 border border-green-800/60 p-3 rounded-lg mb-2">
                                <p class="font-bold text-green-300">${type} by ${servicer} (${hours})</p>
                                ${serviceNote}
                                <p class="text-[10px] text-gray-400 mt-1 text-right">${timestamp}</p>
                            </div>`;
                    } else {
                        const match = note.match(/^\[(.*?)\]\s*(.*)$/);
                        const timestamp = match ? match[1] : 'Just now';
                        const noteText = match ? (match[2] || '').trim() : note;
                        return `
                            <div class="note-bubble self-end bg-gray-700/50 p-3 rounded-lg mb-2">
                                <p>${noteText}</p>
                                <p class="text-[10px] text-gray-400 mt-1 text-right">${timestamp}</p>
                            </div>`;
                    }
                }).join('');
            } else {
                notesContentEl.innerHTML = '<p class="text-center text-gray-500">No notes or service history for this machine.</p>';
            }

            // Set edit fields
            document.getElementById('update-name-input').value = machine.name;
            document.getElementById('update-current-meter-input').value = machine.current_meter || 0;
            document.getElementById('update-service-interval-unit-select').value = machine.service_interval_unit || 'days';
            document.getElementById('update-last-service-date-input').value = machine.last_service_date || '';
            document.getElementById('update-notes-input').value = machine.notes || '';
            document.getElementById('add-note-textarea').value = ''; // Clear quick note field
            document.getElementById('update-farm-select').innerHTML = 
                '<option value="">Select a Farm</option>' + 
                allFarms.map(f => `<option value="${f.id}" ${f.id === machine.farm_id ? 'selected' : ''}>${f.name}</option>`).join('');
            
            // Show tabs for admins
            const tabsContainer = document.getElementById('details-tabs');
            const tabEdit = document.getElementById('tab-edit');
            tabsContainer.classList.remove('hidden'); // Always show tabs now

            if (myProfile.is_admin) {
                tabEdit.classList.remove('hidden');
            } else {
                // Non-admins can't edit, but can still view/print
                tabEdit.classList.add('hidden');
            }
            
            // Reset to regular tab
            switchDetailsTab('regular');
            
            document.getElementById('details-modal').classList.remove('hidden');
        }
        function closeDetailsModal() { 
            selectedMachineId = null; 
            selectedMachineData = null; // Clear the stored machine data
            document.getElementById('details-modal').classList.add('hidden'); 
        }
        
        function switchDetailsTab(tab) {
            const regularContent = document.getElementById('details-regular-content');
            const editContent = document.getElementById('details-edit-content');
            const printContent = document.getElementById('details-print-content');
            const tabRegularBtn = document.getElementById('tab-regular');
            const tabEditBtn = document.getElementById('tab-edit');
            const tabPrintBtn = document.getElementById('tab-print');

            // Hide all content panels first
            regularContent.classList.add('hidden');
            editContent.classList.add('hidden');
            printContent.classList.add('hidden');

            // Deactivate all tab buttons
            [tabRegularBtn, tabEditBtn, tabPrintBtn].forEach(btn => {
                btn.classList.remove('border-blue-500', 'text-white');
                btn.classList.add('border-transparent', 'text-gray-400');
            });
            
            // Activate the selected tab and show its content
            if (tab === 'regular') {
                regularContent.classList.remove('hidden');
                tabRegularBtn.classList.add('border-blue-500', 'text-white');
            } else if (tab === 'edit') {
                editContent.classList.remove('hidden');
                tabEditBtn.classList.add('border-blue-500', 'text-white');
            } else if (tab === 'print') {
                printContent.classList.remove('hidden');
                generatePrintableText(); // Generate the text when tab is opened
                tabPrintBtn.classList.add('border-blue-500', 'text-white');
            }
        }

        // [ID_JS_LOG_SERVICE] - REBUILT
        async function submitNewServiceLog() {
            if (!selectedMachineId) return alert("No machine selected.");

            const hours = document.getElementById('log-machine-hours').value;
            const servicer = document.getElementById('log-servicer-select').value;
            const type = document.getElementById('log-service-type').value;
            const notes = document.getElementById('log-service-notes').value.trim();

            if (!hours) return alert("Machine hours are required to log a service.");
            if (!servicer) return alert("Servicer is required.");

            const { data: machine } = await _supabase.from('machinery').select('notes').eq('id', selectedMachineId).single();
            if (!machine) return alert("Could not find machine to update.");

            const now = new Date();
            const timestamp = now.toLocaleString('en-GB', { hour12: false });
            
            let logEntry = `[Serviced at ${timestamp} | ${hours} hours | ${type} | ${servicer}`;
            if (notes) logEntry += ` | ${notes}`;
            logEntry += ']';

            const updatedNotes = machine.notes ? `${logEntry}\n${machine.notes}` : logEntry;

            const { error } = await _supabase.from('machinery')
                .update({ 
                    last_service_date: now.toISOString().split('T')[0], // Set service date to today
                    notes: updatedNotes,
                    current_meter: parseInt(hours) // Update the main meter reading
                })
                .eq('id', selectedMachineId);

            if (error) {
                alert("Error logging service: " + error.message);
            } else {
                alert("Service logged successfully!");
                document.getElementById('log-service-modal').classList.add('hidden');
                closeDetailsModal(); // Close the main details modal as well
                loadFleet(); // Refresh the main grid
            }
        }

        async function addMachineNote() {

            if (!machine) return alert("Could not find machine.");

            const timestamp = new Date().toLocaleString();
            const formattedNewNote = `[${timestamp}] ${newNoteText}`;
            const updatedNotes = machine.notes ? `${formattedNewNote}\n${machine.notes}` : formattedNewNote;

            const { error } = await _supabase.from('machinery').update({ notes: updatedNotes }).eq('id', selectedMachineId);
            if (error) alert(error.message); else { alert("Note added."); closeDetailsModal(); loadFleet(); }

        // [ID_JS_PRINT_HISTORY]
        function generatePrintableText() {
            const textArea = document.getElementById('printable-text-area');
            if (!selectedMachineData) {
                textArea.value = "No machine data available.";
                return;
            }

            const machine = selectedMachineData;
            const serviceLogs = (machine.notes || '')
                .split('\n')
                .filter(note => note.startsWith('[Serviced at'));

            if (serviceLogs.length === 0) {
                textArea.value = `No service history found for ${machine.name}.`;
                return;
            }

            const headers = ["Date", "Tractor", "Type", "Servicer", "Notes"];
            const tableData = serviceLogs.map(note => {
                const parts = note.replace('[Serviced at ', '').replace(']', '').split(' | ');
                const [date, hours, type, servicer, serviceNote] = parts;
                return [
                    date || '',
                    `${machine.name} (${hours || ''})`,
                    type || '',
                    servicer || '',
                    serviceNote || 'N/A'
                ];
            });

            // Calculate the maximum width for each column
            const columnWidths = headers.map((header, i) => {
                const dataWidths = tableData.map(row => row[i].length);
                return Math.max(header.length, ...dataWidths);
            });

            // Helper function to create a padded row
            const createRow = (rowData) => {
                return rowData.map((cell, i) => {
                    return cell.padEnd(columnWidths[i]);
                }).join(' | ');
            };

            const headerRow = createRow(headers);
            const separatorRow = columnWidths.map(width => '-'.repeat(width)).join('-|-');
            const dataRows = tableData.map(row => createRow(row)).join('\n');

            textArea.value = `${headerRow}\n${separatorRow}\n${dataRows}`;
        }

        function copyPrintableText() {
            const textArea = document.getElementById('printable-text-area');
            textArea.select();
            document.execCommand('copy');
            alert("Service history copied to clipboard!");
        }
